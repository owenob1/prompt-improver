name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: |
          chmod +x tests/smoke-test.sh
          chmod +x skills/prompt-improver/scripts/*.sh
          chmod +x skills/prompt-improver/scripts/backends/*.sh
          chmod +x skills/prompt-improver/scripts/lib/*.sh 2>/dev/null || true

      - name: Run repo smoke tests
        run: bash tests/smoke-test.sh
