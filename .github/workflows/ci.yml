name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/backends/*.sh scripts/lib/*.sh 2>/dev/null || chmod +x scripts/*.sh scripts/backends/*.sh

      - name: Run offline smoke tests
        run: bash scripts/smoke-test.sh
